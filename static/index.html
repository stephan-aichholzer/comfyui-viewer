<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComfyUI Viewer</title>
<style>
:root {
  --bg: #1a1a1a;
  --bg-surface: #242424;
  --bg-hover: #2e2e2e;
  --border: #3a3a3a;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #7c9fd4;
  --accent-hover: #9ab6e0;
  --panel-width: 380px;
  --tree-width: 240px;
  --topbar-height: 48px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  overflow-x: hidden;
}

/* Top bar */
.topbar {
  position: sticky; top: 0; z-index: 100;
  height: var(--topbar-height);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 12px;
}
.breadcrumb { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; }
.breadcrumb a {
  color: var(--accent); text-decoration: none; cursor: pointer;
  white-space: nowrap;
}
.breadcrumb a:hover { color: var(--accent-hover); }
.breadcrumb span.sep { color: var(--text-dim); }
.sort-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.sort-controls select, .sort-controls button {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 8px; font-size: 13px; cursor: pointer;
}
.sort-controls button:hover { background: var(--bg-hover); }

/* Image grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px; padding: 16px;
}
.thumb-card {
  aspect-ratio: 1; border-radius: 6px; overflow: hidden;
  cursor: pointer; position: relative; background: var(--bg-surface);
  border: 2px solid transparent; transition: border-color 0.15s;
}
.thumb-card:hover { border-color: var(--accent); }
.thumb-card img {
  width: 100%; height: 100%; object-fit: cover;
  transition: opacity 0.2s;
}
.thumb-card img[src=""] { opacity: 0; }
.thumb-name {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7); padding: 4px 6px;
  font-size: 11px; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}

/* Layout wrapper */
.main-layout {
  display: flex; min-height: calc(100vh - var(--topbar-height));
}

/* Tree sidebar */
.tree-sidebar {
  width: var(--tree-width); flex-shrink: 0;
  background: var(--bg-surface); border-right: 1px solid var(--border);
  overflow-y: auto; overflow-x: hidden;
  padding: 8px 0; font-size: 13px;
  transition: width 0.2s ease, padding 0.2s ease;
}
.tree-sidebar.collapsed { width: 0; padding: 0; border-right: none; }
.tree-toggle {
  position: fixed; top: var(--topbar-height); left: 0; z-index: 101;
  width: 24px; height: 48px;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-left: none; border-radius: 0 6px 6px 0;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 14px;
  transition: left 0.2s ease;
  left: var(--tree-width);
}
.tree-toggle:hover { color: var(--text); background: var(--bg-hover); }
.tree-toggle.collapsed { left: 0; }
.tree-node { user-select: none; }
.tree-item {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 8px; cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  border-left: 3px solid transparent;
  transition: background 0.1s;
}
.tree-item:hover { background: var(--bg-hover); }
.tree-item.active { background: var(--bg-hover); border-left-color: var(--accent); color: var(--accent); }
.tree-arrow {
  width: 16px; text-align: center; font-size: 10px; color: var(--text-dim);
  flex-shrink: 0; transition: transform 0.15s;
}
.tree-arrow.expanded { transform: rotate(90deg); }
.tree-arrow.empty { visibility: hidden; }
.tree-icon { flex-shrink: 0; opacity: 0.6; font-size: 14px; }
.tree-name { overflow: hidden; text-overflow: ellipsis; }
.tree-children { display: none; }
.tree-children.open { display: block; }

/* Main content area */
.content-area { flex: 1; min-width: 0; }

/* Empty state */
.empty-state {
  padding: 60px; text-align: center; color: var(--text-dim); font-size: 16px;
}

/* Lightbox */
.lightbox {
  position: fixed; inset: 0; z-index: 200; background: #111;
  display: none;
}
.lightbox.open { display: flex; }
.lightbox-img-container {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
  transition: margin-right 0.2s ease;
}
.lightbox-img-container img {
  max-width: 100%; max-height: calc(100vh - 80px); object-fit: contain;
}
.lightbox-nav {
  position: absolute; top: 0; bottom: 0; width: 80px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; opacity: 0; transition: opacity 0.2s;
  font-size: 36px; color: white; user-select: none; z-index: 10;
}
.lightbox-nav:hover { opacity: 0.8; background: rgba(0,0,0,0.3); }
.lightbox-nav.left { left: 0; }
.lightbox-nav.right { right: 0; transition: right 0.2s ease; }
.lightbox-close {
  position: absolute; top: 12px; right: 12px; z-index: 10;
  background: rgba(0,0,0,0.5); border: none; color: white;
  width: 36px; height: 36px; border-radius: 50%; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.lightbox-close:hover { background: rgba(255,255,255,0.15); }
.lightbox-filename {
  position: absolute; bottom: 92px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.6); padding: 4px 14px; border-radius: 12px;
  font-size: 12px; color: #ccc; z-index: 10; pointer-events: none;
  transition: margin-right 0.2s ease;
}
/* Filmstrip */
.filmstrip {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  height: 80px; background: rgba(0,0,0,0.7);
  overflow: hidden;
  transition: margin-right 0.2s ease;
}
.filmstrip-track {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; height: 100%; padding: 8px;
  transition: transform 0.3s ease;
}
.filmstrip-thumb {
  height: 64px; width: 64px; object-fit: cover; border-radius: 4px;
  cursor: pointer; opacity: 0.5; transition: opacity 0.15s, border-color 0.15s;
  border: 2px solid transparent; flex-shrink: 0;
}
.filmstrip-thumb:hover { opacity: 0.8; }
.filmstrip-thumb.active { opacity: 1; border-color: var(--accent); }
/* Panel toggle tab on the edge */
.panel-toggle {
  position: fixed; top: 50%; z-index: 220;
  transform: translateY(-50%);
  width: 24px; height: 64px;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-right: none; border-radius: 6px 0 0 6px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 14px; transition: right 0.2s ease;
  right: var(--panel-width);
}
.panel-toggle:hover { color: var(--text); background: var(--bg-hover); }
.panel-toggle.collapsed {
  right: 0; border-right: 1px solid var(--border);
}
.lightbox-counter {
  position: absolute; top: 12px; left: 12px; z-index: 10;
  background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 10px;
  font-size: 12px; color: #aaa;
}

/* Info panel */
.info-panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: var(--panel-width);
  background: var(--bg-surface); border-left: 1px solid var(--border);
  z-index: 210; transform: translateX(100%); transition: transform 0.2s ease;
  overflow-y: auto; padding: 20px;
}
.info-panel.open { transform: translateX(0); }
.info-section { margin-bottom: 20px; }
.info-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-dim); margin-bottom: 6px;
}
.info-value {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 10px; font-size: 13px; line-height: 1.5;
  font-family: "SF Mono", "Fira Code", "JetBrains Mono", "Cascadia Code", Consolas, monospace;
  white-space: pre-wrap; word-break: break-word; position: relative;
}
.info-value.prompt { min-height: 120px; max-height: 400px; overflow-y: auto; }
.copy-btn {
  position: absolute; top: 6px; right: 6px;
  background: var(--bg-hover); border: 1px solid var(--border);
  color: var(--text-dim); border-radius: 3px; padding: 2px 8px;
  font-size: 11px; cursor: pointer; transition: color 0.15s;
}
.copy-btn:hover { color: var(--text); }
.info-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.info-grid-item {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 8px; min-width: 0;
}
.info-grid-item.wide { grid-column: 1 / -1; }
.info-grid-item .info-label { margin-bottom: 2px; }
.info-grid-item .info-val {
  font-size: 13px;
  font-family: "SF Mono", "Fira Code", "JetBrains Mono", "Cascadia Code", Consolas, monospace;
  overflow: hidden; text-overflow: ellipsis;
}
.info-grid-item .info-val.wrap {
  word-break: break-all; overflow: visible; text-overflow: unset;
}
.info-no-data { color: var(--text-dim); font-style: italic; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar" id="topbar">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="sort-controls">
    <select id="sortBy">
      <option value="modified">Date modified</option>
      <option value="name">Name</option>
    </select>
    <button id="sortOrder" title="Toggle sort order">&#x25BC; Desc</button>
  </div>
</div>

<!-- Main layout -->
<div class="main-layout">
  <div class="tree-sidebar" id="tree-sidebar">
    <div class="tree-node">
      <div class="tree-item active" data-path="" onclick="treeSelect('')">
        <span class="tree-arrow expanded">&#9654;</span>
        <span class="tree-icon">&#128193;</span>
        <span class="tree-name">Root</span>
      </div>
      <div class="tree-children open" id="tree-root"></div>
    </div>
  </div>
  <div class="content-area">
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty-state" style="display:none">No images in this folder</div>
  </div>
</div>
<div class="tree-toggle" id="tree-toggle" title="Toggle folder tree">&#9666;</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-counter" id="lb-counter"></div>
  <button class="lightbox-close" id="lb-close" title="Close (Esc)">&times;</button>
  <div class="lightbox-nav left" id="lb-prev">&#8249;</div>
  <div class="lightbox-img-container" id="lb-img-container">
    <img id="lb-img" src="" alt="">
  </div>
  <div class="lightbox-nav right" id="lb-next">&#8250;</div>
  <div class="lightbox-filename" id="lb-filename"></div>
  <div class="filmstrip" id="filmstrip"><div class="filmstrip-track" id="filmstrip-track"></div></div>
</div>

<!-- Info panel -->
<div class="panel-toggle" id="panel-toggle" title="Toggle info panel (I)">&#9666;</div>
<div class="info-panel" id="info-panel">
  <div id="info-content"></div>
</div>

<script>
const state = {
  currentPath: '',
  images: [],
  index: -1,
  sortBy: 'modified',
  sortOrder: 'desc',
  lightboxOpen: false,
  infoPanelOpen: false,
  metadataCache: {},
};

const $ = (sel) => document.querySelector(sel);
const $sortBy = $('#sortBy');
const $sortOrder = $('#sortOrder');
const $breadcrumb = $('#breadcrumb');
const $grid = $('#grid');
const $empty = $('#empty');
const $lightbox = $('#lightbox');
const $lbImg = $('#lb-img');
const $lbImgContainer = $('#lb-img-container');
const $lbFilename = $('#lb-filename');
const $lbCounter = $('#lb-counter');
const $infoPanel = $('#info-panel');
const $infoContent = $('#info-content');
const $filmstrip = $('#filmstrip');

// --- API ---
async function apiBrowse(path, sort, order) {
  const params = new URLSearchParams({ path, sort, order });
  const res = await fetch(`/api/browse?${params}`);
  return res.json();
}

async function apiMetadata(path) {
  if (state.metadataCache[path]) return state.metadataCache[path];
  const encodedPath = path.split('/').map(encodeURIComponent).join('/');
  const res = await fetch(`/api/metadata/${encodedPath}`);
  const data = await res.json();
  state.metadataCache[path] = data;
  return data;
}

// --- Tree Sidebar ---
const $treeSidebar = $('#tree-sidebar');
const $treeToggle = $('#tree-toggle');
const $treeRoot = $('#tree-root');
let treeOpen = true;

$treeToggle.addEventListener('click', () => {
  treeOpen = !treeOpen;
  $treeSidebar.classList.toggle('collapsed', !treeOpen);
  $treeToggle.classList.toggle('collapsed', !treeOpen);
  $treeToggle.innerHTML = treeOpen ? '&#9666;' : '&#9656;';
});

async function apiTree(path) {
  const params = new URLSearchParams({ path });
  const res = await fetch(`/api/tree?${params}`);
  return res.json();
}

async function loadTreeChildren(parentEl, path) {
  if (parentEl.dataset.loaded) return;
  parentEl.dataset.loaded = '1';
  const data = await apiTree(path);
  let html = '';
  for (const f of data.folders) {
    const arrowCls = f.has_children ? 'tree-arrow' : 'tree-arrow empty';
    html += `<div class="tree-node">
      <div class="tree-item" data-path="${f.path}" onclick="treeSelect('${f.path}', this)" style="padding-left:${getDepth(f.path) * 16 + 8}px">
        <span class="${arrowCls}" onclick="event.stopPropagation();treeToggleExpand(this, '${f.path}')">&#9654;</span>
        <span class="tree-icon">&#128193;</span>
        <span class="tree-name">${f.name}</span>
      </div>
      <div class="tree-children"></div>
    </div>`;
  }
  parentEl.innerHTML = html;
}

function getDepth(path) {
  if (!path) return 0;
  return path.split('/').length;
}

async function treeToggleExpand(arrowEl, path) {
  const node = arrowEl.closest('.tree-node');
  const children = node.querySelector('.tree-children');
  const isOpen = children.classList.contains('open');
  if (isOpen) {
    children.classList.remove('open');
    arrowEl.classList.remove('expanded');
  } else {
    await loadTreeChildren(children, path);
    children.classList.add('open');
    arrowEl.classList.add('expanded');
  }
}

function treeSelect(path) {
  // Update active state in tree
  const prev = $treeSidebar.querySelector('.tree-item.active');
  if (prev) prev.classList.remove('active');
  const item = $treeSidebar.querySelector(`.tree-item[data-path="${path}"]`);
  if (item) item.classList.add('active');
  loadFolder(path);
}

// --- Grid View ---
async function loadFolder(path) {
  state.currentPath = path;
  state.metadataCache = {};
  const data = await apiBrowse(path, state.sortBy, state.sortOrder);
  renderBreadcrumb(data.current_path);
  renderGrid(data.images);
  state.images = data.images;
}

function renderBreadcrumb(current) {
  let html = '<a onclick="treeSelect(\'\')">Root</a>';
  if (current) {
    const parts = current.split(/[/\\]/);
    let accum = '';
    for (const part of parts) {
      accum = accum ? accum + '/' + part : part;
      html += `<span class="sep">/</span><a onclick="treeSelect('${accum}')">${part}</a>`;
    }
  }
  $breadcrumb.innerHTML = html;
}

function renderGrid(images) {
  if (!images.length) {
    $grid.innerHTML = '';
    $empty.style.display = 'block';
    return;
  }
  $empty.style.display = 'none';
  $grid.innerHTML = images.map((img, i) =>
    `<div class="thumb-card" onclick="openLightbox(${i})">
      <img src="/api/thumbnail/${img.path.split('/').map(encodeURIComponent).join('/')}" loading="lazy" alt="${img.name}">
      <div class="thumb-name">${img.name}</div>
    </div>`
  ).join('');
}

// --- Sort controls ---
$sortBy.addEventListener('change', () => {
  state.sortBy = $sortBy.value;
  loadFolder(state.currentPath);
});

$sortOrder.addEventListener('click', () => {
  state.sortOrder = state.sortOrder === 'desc' ? 'asc' : 'desc';
  $sortOrder.innerHTML = state.sortOrder === 'desc' ? '&#x25BC; Desc' : '&#x25B2; Asc';
  loadFolder(state.currentPath);
});

// --- Lightbox ---
const $panelToggle = $('#panel-toggle');

function openLightbox(index) {
  state.index = index;
  state.lightboxOpen = true;
  state.infoPanelOpen = true;
  $lightbox.classList.add('open');
  $infoPanel.classList.add('open');
  $panelToggle.classList.remove('collapsed');
  $panelToggle.innerHTML = '&#9656;';
  $panelToggle.style.display = '';
  $lbImgContainer.style.marginRight = 'var(--panel-width)';
  $('#lb-next').style.right = 'var(--panel-width)';
  $filmstrip.style.marginRight = 'var(--panel-width)';
  $lbFilename.style.marginRight = 'var(--panel-width)';
  document.body.style.overflow = 'hidden';
  buildFilmstrip();
  showImage(index);
}

function closeLightbox() {
  state.lightboxOpen = false;
  state.infoPanelOpen = false;
  $lightbox.classList.remove('open');
  $infoPanel.classList.remove('open');
  $panelToggle.style.display = 'none';
  $lbImgContainer.style.marginRight = '0';
  $('#lb-next').style.right = '0';
  $filmstrip.style.marginRight = '0';
  $lbFilename.style.marginRight = '0';
  document.body.style.overflow = '';
}

function showImage(index) {
  const img = state.images[index];
  if (!img) return;
  $lbImg.src = `/api/image/${img.path.split('/').map(encodeURIComponent).join('/')}`;
  $lbFilename.textContent = img.name;
  $lbCounter.textContent = `${index + 1} / ${state.images.length}`;
  state.index = index;
  updateFilmstrip(index);
  // Preload neighbors
  preload(index - 1);
  preload(index + 1);
  // Refresh info panel
  if (state.infoPanelOpen) loadInfoPanel(img.path);
}

function preload(index) {
  const len = state.images.length;
  const wrapped = ((index % len) + len) % len;
  const img = state.images[wrapped];
  if (img) {
    const pre = new Image();
    pre.src = `/api/image/${img.path.split('/').map(encodeURIComponent).join('/')}`;
  }
}

function navigate(delta) {
  const len = state.images.length;
  if (!len) return;
  const next = ((state.index + delta) % len + len) % len;
  showImage(next);
}

$('#lb-close').addEventListener('click', closeLightbox);
$('#lb-prev').addEventListener('click', () => navigate(-1));
$('#lb-next').addEventListener('click', () => navigate(1));

// --- Filmstrip ---
const THUMB_W = 70; // 64px + 6px gap
const $filmstripTrack = $('#filmstrip-track');

function buildFilmstrip() {
  const len = state.images.length;
  let html = '';
  for (let i = 0; i < len; i++) {
    const img = state.images[i];
    const thumbUrl = `/api/thumbnail/${img.path.split('/').map(encodeURIComponent).join('/')}`;
    html += `<img class="filmstrip-thumb" data-index="${i}" src="${thumbUrl}" onclick="showImage(${i})" title="${img.name}">`;
  }
  $filmstripTrack.innerHTML = html;
}

function updateFilmstrip(index) {
  // Update active class
  const prev = $filmstripTrack.querySelector('.active');
  if (prev) prev.classList.remove('active');
  const cur = $filmstripTrack.querySelector(`[data-index="${index}"]`);
  if (cur) cur.classList.add('active');

  // Calculate scroll to center the active thumb
  const panelOffset = state.infoPanelOpen ? 380 : 0;
  const stripWidth = $filmstrip.offsetWidth - panelOffset;
  const centerOffset = stripWidth / 2;
  const totalWidth = state.images.length * THUMB_W;
  const thumbCenter = index * THUMB_W + THUMB_W / 2;
  const shift = centerOffset - thumbCenter;

  $filmstripTrack.style.transform = `translateX(${shift}px)`;
  $filmstripTrack.style.justifyContent = 'flex-start';
}

// --- Info Panel ---
function toggleInfoPanel() {
  state.infoPanelOpen = !state.infoPanelOpen;
  $infoPanel.classList.toggle('open', state.infoPanelOpen);
  $panelToggle.classList.toggle('collapsed', !state.infoPanelOpen);
  // Arrow: ▶ to show, ◀ to hide
  $panelToggle.innerHTML = state.infoPanelOpen ? '&#9656;' : '&#9666;';
  const mr = state.infoPanelOpen ? 'var(--panel-width)' : '0';
  $lbImgContainer.style.marginRight = mr;
  $('#lb-next').style.right = mr;
  $filmstrip.style.marginRight = mr;
  $lbFilename.style.marginRight = mr;
  if (state.infoPanelOpen && state.index >= 0) {
    loadInfoPanel(state.images[state.index].path);
  }
}

$panelToggle.style.display = 'none';
$panelToggle.addEventListener('click', toggleInfoPanel);

async function loadInfoPanel(path) {
  $infoContent.innerHTML = '<div class="info-no-data">Loading...</div>';
  const meta = await apiMetadata(path);
  renderInfo(meta);
}

function renderInfo(meta) {
  let html = '';

  // Positive prompt
  if (meta.positive_prompt) {
    html += infoSection('Positive Prompt',
      `<div class="info-value prompt">${esc(meta.positive_prompt)}<button class="copy-btn" onclick="copyText(this, '${escAttr(meta.positive_prompt)}')">Copy</button></div>`
    );
  }

  // Negative prompt
  if (meta.negative_prompt) {
    html += infoSection('Negative Prompt',
      `<div class="info-value prompt">${esc(meta.negative_prompt)}<button class="copy-btn" onclick="copyText(this, '${escAttr(meta.negative_prompt)}')">Copy</button></div>`
    );
  }

  // Parameters grid — wide items span full row, short items pair up
  html += '<div class="info-grid">';
  if (meta.architecture) html += gridItem('Architecture', meta.architecture);
  if (meta.width && meta.height) html += gridItem('Size', `${meta.width} × ${meta.height}`);
  if (meta.model) html += gridItem('Model', meta.model.split(/[/\\]/).pop(), true);
  if (meta.sampler) html += gridItem('Sampler', meta.sampler);
  if (meta.scheduler) html += gridItem('Scheduler', meta.scheduler);
  if (meta.steps != null) html += gridItem('Steps', meta.steps);
  if (meta.cfg != null) html += gridItem('CFG', meta.cfg);
  if (meta.guidance != null) html += gridItem('Guidance', meta.guidance);
  if (meta.denoise != null) html += gridItem('Denoise', meta.denoise);
  if (meta.seed != null) html += gridItem('Seed', meta.seed, true);
  if (meta.vae) html += gridItem('VAE', meta.vae, true);
  if (meta.created) html += gridItem('Created', meta.created, true);

  // Extra fields (clip model, etc.)
  if (meta.extra) {
    for (const [k, v] of Object.entries(meta.extra)) {
      html += gridItem(k.replace(/_/g, ' '), v, true);
    }
  }
  html += '</div>';

  // Model full path (copyable)
  if (meta.model) {
    html += infoSection('Model Path',
      `<div class="info-value">${esc(meta.model)}<button class="copy-btn" onclick="copyText(this, '${escAttr(meta.model)}')">Copy</button></div>`
    );
  }

  $infoContent.innerHTML = html;
}

function infoSection(label, content) {
  return `<div class="info-section"><div class="info-label">${label}</div>${content}</div>`;
}

function gridItem(label, value, wide) {
  const cls = wide ? 'info-grid-item wide' : 'info-grid-item';
  const valCls = wide ? 'info-val wrap' : 'info-val';
  return `<div class="${cls}"><div class="info-label">${label}</div><div class="${valCls}">${esc(String(value))}</div></div>`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '');
}

function copyText(btn, text) {
  const decoded = text.replace(/\\n/g, '\n').replace(/\\'/g, "'").replace(/\\\\/g, '\\');
  navigator.clipboard.writeText(decoded).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1200);
  });
}

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (!state.lightboxOpen) return;
  switch (e.key) {
    case 'ArrowLeft':  e.preventDefault(); navigate(-1); break;
    case 'ArrowRight': e.preventDefault(); navigate(1); break;
    case 'Escape':
      e.preventDefault();
      if (state.infoPanelOpen) toggleInfoPanel();
      else closeLightbox();
      break;
    case 'i': case 'I':
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') break;
      e.preventDefault();
      toggleInfoPanel();
      break;
  }
});

// --- Init ---
loadTreeChildren($treeRoot, '');
loadFolder('');
</script>
</body>
</html>
